name: t_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  excel: ^4.0.6
  flutter:
    sdk: flutter
  flutter_local_notifications: ^21.0.0
  flutter_riverpod: ^3.3.1
  google_fonts: ^8.0.2
  intl: ^0.20.2
  path: ^1.9.1
  path_provider: ^2.1.5
  share_plus: ^12.0.1
  shared_preferences: ^2.5.4
  sqflite: ^2.4.2
  timezone: ^0.11.0
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path_android: assets/branding/kove_icon_full.png
  adaptive_icon_background: "#98C95F"
  adaptive_icon_foreground: assets/branding/kove_icon_foreground.png

flutter_native_splash:
  color: "#0F172A"
  image: assets/branding/kove_splash_logo.png
  android: true
  ios: false
  web: false
  android_12:
    color: "#0F172A"
    image: assets/branding/kove_android12_mark.png
